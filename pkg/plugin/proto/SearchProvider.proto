syntax = "proto3";
package generated;
option go_package = "github.com/vmware-tanzu/velero/pkg/plugin/generated";

import "Shared.proto";

message SearchProviderInitRequest {
    string plugin = 1;
    map<string, string> config = 2;
}

message IndexBackupRequest {
    string plugin      = 1;
    string backup_name = 2;
    string tarball_url = 3;
}

message DeleteBackupRequest {
    string plugin      = 1;
    string backup_name = 2;
}

message SearchRequest {
    string plugin              = 1;
    string name                = 2;
    string namespace           = 3;
    string kind                = 4;
    string api_version         = 5;
    map<string, string> labels = 6;
    string backup_name         = 7;
    int32  limit               = 8;
    int32  offset              = 9;
}

message ResourceRecord {
    string backup_name           = 1;
    string resource_name         = 2;
    string api_version           = 3;
    string kind                  = 4;
    string namespace             = 5;
    map<string, string> labels   = 6;
}

message SearchResponse {
    repeated ResourceRecord items = 1;
    int32 total_count             = 2;
}

message ReadyRequest {
    string plugin = 1;
}

message ReadyResponse {
    bool ready = 1;
}

message ListIndexedBackupsRequest {
    string plugin = 1;
}

message ListIndexedBackupsResponse {
    repeated string backup_names = 1;
}

message MarkReadyRequest {
    string plugin = 1;
}

service SearchProvider {
    rpc Init(SearchProviderInitRequest) returns (Empty);
    rpc IndexBackup(IndexBackupRequest) returns (Empty);
    rpc DeleteBackup(DeleteBackupRequest) returns (Empty);
    rpc Search(SearchRequest) returns (SearchResponse);
    rpc Ready(ReadyRequest) returns (ReadyResponse);
    rpc ListIndexedBackups(ListIndexedBackupsRequest) returns (ListIndexedBackupsResponse);
    rpc MarkReady(MarkReadyRequest) returns (Empty);
}

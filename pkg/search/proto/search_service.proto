syntax = "proto3";
package velero.search.v1;
option go_package = "github.com/vmware-tanzu/velero/pkg/search/generated;searchv1";

import "google/protobuf/empty.proto";

service SearchService {
  rpc Search(SearchRequest) returns (SearchResponse);
  rpc SearchStream(SearchRequest) returns (stream ResourceRecord);
  rpc Ready(google.protobuf.Empty) returns (ReadyResponse);
}

message SearchRequest {
  string name                  = 1;
  string namespace             = 2;
  string kind                  = 3;
  string api_version           = 4;
  map<string, string> labels   = 5;
  string backup_name           = 6;
  int32  limit                 = 7;
  int32  offset                = 8;
}

message ResourceRecord {
  string backup_name           = 1;
  string resource_name         = 2;
  string api_version           = 3;
  string kind                  = 4;
  string namespace             = 5;
  map<string, string> labels   = 6;
}

message SearchResponse {
  repeated ResourceRecord items = 1;
  int32 total_count             = 2;
}

message ReadyResponse {
  bool ready = 1;
}
